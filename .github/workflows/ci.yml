name: "CI - Build & Test"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    # Use the runner's native Swift toolchain (matches the release workflow).
    # The pinned swift-actions/setup-swift @ 5.9 crashed building Yams' module
    # interface; the modern runner toolchain builds the package cleanly.
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (Debug)
        run: swift build

      - name: Build (Release)
        run: swift build --configuration release

      - name: Run Tests
        run: swift test
