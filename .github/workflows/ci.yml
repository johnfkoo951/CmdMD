name: "CI - Build & Test"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Build (Debug)
        run: swift build

      - name: Build (Release)
        run: swift build --configuration release

      - name: Run Tests
        run: swift test 2>&1 || echo "No tests found (skipping)"
